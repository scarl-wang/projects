<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Hold my hand</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; font-family: 'Courier New', monospace; }
    #ui { position: fixed; top: 10px; left: 50%; transform: translateX(-50%); display: flex; gap: 12px; z-index: 100; }
    button {
      background: transparent; border: 1px solid #444; color: #888;
      padding: 6px 14px; font-family: 'Courier New', monospace; font-size: 11px;
      cursor: pointer; letter-spacing: 2px; text-transform: uppercase;
      transition: all 0.2s;
    }
    button:hover { border-color: #fff; color: #fff; }
    button:disabled { opacity: 0.3; cursor: not-allowed; }
    #status {
      position: fixed; bottom: 10px; left: 50%; transform: translateX(-50%);
      color: #333; font-size: 10px; letter-spacing: 3px; text-transform: uppercase;
      z-index: 100;
    }
    #debug {
      position: fixed; top: 10px; right: 14px;
      color: #333; font-size: 10px; letter-spacing: 1px; text-align: right;
      z-index: 100; line-height: 1.6;
    }
    canvas { display: block; }
    #log {
      position: fixed; bottom: 30px; left: 10px;
      width: 220px; max-height: 120px; overflow-y: auto;
      background: rgba(0,0,0,0.8); border: 1px solid #222;
      color: #0f0; font-size: 9px; letter-spacing: 1px;
      padding: 6px; z-index: 200; line-height: 1.6;
      font-family: 'Courier New', monospace;
    }
    #log div { border-bottom: 1px solid #111; }
  </style>
</head>
<body>

<div id="ui">
  <button id="connectBtn">⬡ CONNECT SERIAL</button>
  <button id="disconnectBtn" disabled>✕ DISCONNECT</button>
</div>

<div id="debug">
  DIST: <span id="distVal">---</span> cm<br>
  ZONE: <span id="zoneVal">---</span>
</div>

<div id="status">AWAITING SIGNAL</div>
<div id="log"><div>— SERIAL LOG —</div></div>

<script>
  let port, reader, readLoopActive = false;
  let distanceCm = null;

  const connectBtn    = document.getElementById('connectBtn');
  const disconnectBtn = document.getElementById('disconnectBtn');
  const statusEl      = document.getElementById('status');
  const distValEl     = document.getElementById('distVal');
  const zoneValEl     = document.getElementById('zoneVal');
  const logEl         = document.getElementById('log');

  function addLog(msg) {
    const d = document.createElement('div');
    d.textContent = msg;
    logEl.appendChild(d);
    logEl.scrollTop = logEl.scrollHeight;
    // keep log short
    while (logEl.children.length > 30) logEl.removeChild(logEl.children[1]);
  }

  connectBtn.addEventListener('click', async () => {
    try {
      port = await navigator.serial.requestPort();
      addLog('Port selected');
      await port.open({ baudRate: 9600 });
      addLog('Port opened @ 9600');
      readLoopActive = true;
      connectBtn.disabled = true;
      disconnectBtn.disabled = false;
      statusEl.textContent = 'CONNECTED — READING SENSOR';
      readLoop();
    } catch (e) {
      statusEl.textContent = 'CONNECTION FAILED';
      addLog('ERR: ' + e.message);
    }
  });

  disconnectBtn.addEventListener('click', async () => {
    readLoopActive = false;
    try { await reader.cancel(); } catch(_) {}
    try { await port.close(); }   catch(_) {}
    connectBtn.disabled = false;
    disconnectBtn.disabled = true;
    statusEl.textContent = 'DISCONNECTED';
    distanceCm = null;
    addLog('Disconnected');
  });

  async function readLoop() {
    const decoder = new TextDecoderStream();
    const pipePromise = port.readable.pipeTo(decoder.writable);
    reader = decoder.readable.getReader();
    let buffer = '';
    addLog('Read loop started');

    try {
      while (readLoopActive) {
        const { value, done } = await reader.read();
        if (done) { addLog('Stream done'); break; }

        buffer += value;
        addLog('RAW: ' + value.replace(/\n/g,'↵').replace(/\r/g,'').trim().slice(0,40));

        const lines = buffer.split('\n');
        buffer = lines.pop(); // keep incomplete tail

        for (const line of lines) {
          const trimmed = line.trim();
          if (!trimmed) continue;
          addLog('LINE: ' + trimmed.slice(0, 40));

          const d = parseFloat(trimmed);
          if (!isNaN(d)) {
            distanceCm = d;
            distValEl.textContent = d.toFixed(1);
            addLog('✓ ' + d.toFixed(1) + ' cm');
          }
        }
      }
    } catch(e) {
      addLog('READ ERR: ' + e.message);
      if (readLoopActive) statusEl.textContent = 'READ ERROR: ' + e.message;
    } finally {
      try { reader.releaseLock(); } catch(_) {}
    }
  }

  // Expose to sketch.js
  window.getDistance     = () => distanceCm;
  window.updateZoneLabel = (z) => { zoneValEl.textContent = z; };
</script>

<script src="sketch.js"></script>

</body>
</html>
