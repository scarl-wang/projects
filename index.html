<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex">
    <title>Scarlett Wang</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Newsreader:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: 'Inter', -apple-system, sans-serif;
        background: #fafafa;
        color: #1a1a1a;
        line-height: 1.6;
        padding: 80px 24px;
        min-height: 100vh;
      }

      main {
        max-width: 600px;
        margin: 0 auto;
      }

      header {
        margin-bottom: 64px;
        padding-bottom: 32px;
        border-bottom: 1px solid #e0e0e0;
      }

      h1 {
        font-family: 'Newsreader', Georgia, serif;
        font-weight: 400;
        font-size: 2rem;
        letter-spacing: -0.02em;
        margin-bottom: 8px;
      }

      .subtitle {
        font-size: 0.875rem;
        color: #666;
        letter-spacing: 0.05em;
        text-transform: uppercase;
      }

      section {
        margin-bottom: 48px;
      }

      h2 {
        font-size: 0.75rem;
        font-weight: 500;
        color: #999;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        margin-bottom: 20px;
      }

      ul {
        list-style: none;
      }

      li {
        padding: 12px 0;
        border-bottom: 1px solid #eee;
      }

      li:last-child {
        border-bottom: none;
      }

      a {
        color: #1a1a1a;
        text-decoration: none;
        transition: color 0.2s ease;
      }

      a:hover {
        color: #666;
      }

      /* Subtle number labels */
      .num {
        font-size: 0.75rem;
        color: #bbb;
        margin-right: 12px;
        font-variant-numeric: tabular-nums;
      }

      /* Inline project with parts */
      .project-inline {
        display: flex;
        align-items: baseline;
      }

      .project-inline .project-title {
        margin-right: 8px;
      }

      .project-parts {
        display: flex;
        gap: 16px;
      }

      .project-parts li {
        border: none;
        padding: 0;
      }

      .project-parts a {
        font-size: 0.875rem;
        color: #999;
        padding-bottom: 2px;
        border-bottom: 1px solid transparent;
      }

      .project-parts a:hover {
        color: #1a1a1a;
        border-bottom-color: #1a1a1a;
      }

      /* Separator between title and parts */
      .separator {
        color: #ddd;
        margin: 0 4px;
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <h1>Scarlett Wang</h1>
      </header>

      <section>
        <h2>Projects</h2>
        <ul>
          <li><span class="num">01</span><a href="./V1/">IS THIS WHAT BREATHING FEELS LIKE?</a></li>
        </ul>
      </section>


    </main>
  </body>
</html>
