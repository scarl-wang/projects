<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Hold my hand</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; font-family: 'Courier New', monospace; }
    #ui { position: fixed; top: 10px; left: 50%; transform: translateX(-50%); display: flex; gap: 12px; z-index: 100; }
    button {
      background: transparent; border: 1px solid #444; color: #888;
      padding: 6px 14px; font-family: 'Courier New', monospace; font-size: 11px;
      cursor: pointer; letter-spacing: 2px; text-transform: uppercase;
      transition: all 0.2s;
    }
    button:hover { border-color: #fff; color: #fff; }
    button:disabled { opacity: 0.3; cursor: not-allowed; }
    #status {
      position: fixed; bottom: 10px; left: 50%; transform: translateX(-50%);
      color: #333; font-size: 10px; letter-spacing: 3px; text-transform: uppercase;
      z-index: 100;
    }
    #debug {
      position: fixed; top: 10px; right: 14px;
      color: #0f0; font-size: 11px; letter-spacing: 1px; text-align: right;
      z-index: 100; line-height: 1.8;
    }
    canvas { display: block; }
    #log {
      position: fixed; bottom: 30px; left: 10px;
      width: 260px; max-height: 160px; overflow-y: auto;
      background: rgba(0,0,0,0.9); border: 1px solid #333;
      color: #0f0; font-size: 10px; letter-spacing: 1px;
      padding: 6px; z-index: 200; line-height: 1.8;
      font-family: 'Courier New', monospace;
    }
    #log div { border-bottom: 1px solid #111; }
  </style>
</head>
<body>

<div id="ui">
  <button id="connectBtn">⬡ CONNECT SERIAL</button>
  <button id="disconnectBtn" disabled>✕ DISCONNECT</button>
</div>

<div id="debug">
  DIST: <span id="distVal">---</span> cm<br>
  TOUCH: <span id="touchVal">---</span><br>
  TOUCHING: <span id="touchingVal">false</span><br>
  ZONE: <span id="zoneVal">---</span>
</div>

<div id="status">AWAITING SIGNAL</div>
<div id="log"><div>— SERIAL LOG —</div></div>

<script>
  let port;
  let reader;
  let inputDone;
  let readLoopActive = false;
  let distanceCm = null;
  let touchValue = null;

  const connectBtn   = document.getElementById('connectBtn');
  const disconnectBtn= document.getElementById('disconnectBtn');
  const statusEl     = document.getElementById('status');
  const distValEl    = document.getElementById('distVal');
  const touchValEl   = document.getElementById('touchVal');
  const touchingValEl= document.getElementById('touchingVal');
  const zoneValEl    = document.getElementById('zoneVal');
  const logEl        = document.getElementById('log');

  function addLog(msg) {
    const d = document.createElement('div');
    d.textContent = msg;
    logEl.appendChild(d);
    logEl.scrollTop = logEl.scrollHeight;
    while (logEl.children.length > 30) logEl.removeChild(logEl.children[1]);
  }

  if (!("serial" in navigator)) {
    statusEl.textContent = 'BROWSER NOT SUPPORTED';
    addLog('ERR: Web Serial requires Chrome or Edge.');
    connectBtn.disabled = true;
  }

  connectBtn.addEventListener('click', async () => {
    try {
      port = await navigator.serial.requestPort();
      addLog('Port selected');
      await port.open({ baudRate: 9600 });
      addLog('Port opened @ 9600');
      readLoopActive = true;
      connectBtn.disabled = true;
      disconnectBtn.disabled = false;
      statusEl.textContent = 'CONNECTED — READING SENSOR';
      startReading();
    } catch (e) {
      statusEl.textContent = 'CONNECTION FAILED';
      addLog('ERR: ' + e.message);
    }
  });

  disconnectBtn.addEventListener('click', async () => {
    readLoopActive = false;
    connectBtn.disabled = false;
    disconnectBtn.disabled = true;
    statusEl.textContent = 'DISCONNECTING...';
    try {
      if (reader) { await reader.cancel(); await inputDone.catch(() => {}); reader = null; }
      if (port)   { await port.close(); port = null; }
      statusEl.textContent = 'DISCONNECTED';
      distanceCm = null;
      touchValue = null;
      addLog('Disconnected safely');
    } catch (e) {
      statusEl.textContent = 'DISCONNECT ERROR';
      addLog('ERR: ' + e.message);
    }
  });

  async function startReading() {
    const decoder = new TextDecoderStream();
    inputDone = port.readable.pipeTo(decoder.writable);
    reader = decoder.readable.getReader();
    let buffer = '';
    addLog('Read loop started');

    try {
      while (readLoopActive) {
        const { value, done } = await reader.read();
        if (done) { addLog('Stream done'); break; }

        buffer += value;
        const lines = buffer.split('\n');
        buffer = lines.pop(); // keep incomplete trailing chunk

        for (const line of lines) {
          const trimmed = line.trim();
          if (!trimmed) continue;

          addLog('RAW: ' + trimmed);

          // Expect "distance,touch" e.g. "118.86,312"
          const parts = trimmed.split(',');

          if (parts.length >= 2) {
            const d = parseFloat(parts[0]);
            const t = parseInt(parts[1]);
            if (!isNaN(d)) { distanceCm = d; distValEl.textContent = d.toFixed(1); }
            if (!isNaN(t)) { touchValue = t;  touchValEl.textContent = t; }
          } else {
            // Only one value — log it so we can see what's wrong
            addLog('WARN: expected 2 values, got: "' + trimmed + '"');
          }
        }
      }
    } catch(e) {
      addLog('READ ERR: ' + e.message);
      if (readLoopActive) statusEl.textContent = 'READ ERROR: ' + e.message;
    } finally {
      if (reader) reader.releaseLock();
    }
  }

  window.getDistance      = () => distanceCm;
  window.getTouchValue    = () => touchValue;
  // Called by sketch.js to update the TOUCHING and ZONE labels
  window.updateZoneLabel  = (z, touching) => {
    zoneValEl.textContent    = z;
    touchingValEl.textContent= String(touching);
  };
</script>

<script src="sketch.js"></script>

</body>
</html>
